<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP-Du · IP Address Intelligence</title>
  <meta name="description" content="Free IP address geolocation lookup. Instantly find the location, ISP, ASN and network details for any IPv4/IPv6 address or domain name." />
  <meta name="keywords" content="IP lookup, IP geolocation, IP address, IPv4, IPv6, DNS lookup, ISP, ASN, IP location" />
  <meta name="author" content="IP-Du" />
  <meta property="og:title" content="IP-Du · IP Address Intelligence" />
  <meta property="og:description" content="Free IP geolocation lookup for any IPv4/IPv6 address or domain." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#0ea5e9" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:            #020617;
      --bg-2:          #0f172a;
      --card:          rgba(15, 23, 42, 0.65);
      --card-deep:     rgba(15, 23, 42, 0.9);
      --border:        rgba(148, 163, 184, 0.1);
      --border-light:  rgba(56, 189, 248, 0.2);
      --accent:        #38bdf8;
      --accent-2:      #818cf8;
      --accent-g:      linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
      --text:          #f8fafc;
      --text-dim:      #94a3b8;
      --text-muted:    #475569;
      --success:       #10b981;
      --warning:       #f59e0b;
      --error:         #ef4444;
      --blur:          blur(20px);
      --radius:        16px;
      --radius-sm:     12px;
      --radius-xs:     8px;
      --border-hover:  rgba(56, 189, 248, 0.45);
      --shadow:        0 8px 32px rgba(0, 0, 0, 0.4);
      --shadow-card:   0 4px 20px rgba(0, 0, 0, 0.2);
      --transition:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="light"] {
      --bg:            #f8fafc;
      --bg-2:          #f1f5f9;
      --card:          rgba(255, 255, 255, 0.7);
      --card-deep:     rgba(255, 255, 255, 0.95);
      --border:        rgba(148, 163, 184, 0.2);
      --border-light:  rgba(2, 132, 199, 0.2);
      --border-hover:  rgba(2, 132, 199, 0.45);
      --radius-xs:     8px;
      --text:          #0f172a;
      --text-dim:      #475569;
      --text-muted:    #94a3b8;
    }
    [data-theme="light"] {
      --bg:            #f0f4ff;
      --bg-2:          #e8eeff;
      --card:          rgba(255, 255, 255, 0.75);
      --card-hover:    rgba(255, 255, 255, 0.95);
      --border:        rgba(99, 102, 241, 0.15);
      --border-hover:  rgba(99, 102, 241, 0.4);
      --accent:        #0284c7;
      --accent-2:      #6366f1;
      --accent-g:      linear-gradient(135deg, #0284c7 0%, #6366f1 100%);
      --text:          #0f172a;
      --text-dim:      #475569;
      --text-muted:    #94a3b8;
      --shadow:        0 20px 60px rgba(99,102,241,.12), 0 4px 16px rgba(0,0,0,.06);
      --shadow-card:   0 4px 30px rgba(99,102,241,.08);
    }

    /* ─── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Animated Background ───────────────────────────────────── */
    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: orb-drift 12s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 60vw; height: 60vw; top: -20%; left: -15%;
      background: radial-gradient(circle, #38bdf8, transparent 60%); }
    .bg-orb-2 { width: 45vw; height: 45vw; bottom: -10%; right: -10%;
      background: radial-gradient(circle, #818cf8, transparent 60%);
      animation-delay: -6s; animation-direction: alternate-reverse; }
    .bg-orb-3 { width: 30vw; height: 30vw; top: 50%; left: 50%;
      background: radial-gradient(circle, #0ea5e9, transparent 60%);
      animation-delay: -3s; }
    [data-theme="light"] .bg-orb { opacity: 0.08; }
    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 20px) scale(1.05); }
    }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(56,189,248,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    [data-theme="light"] .bg-grid {
      background-image:
        linear-gradient(rgba(99,102,241,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.05) 1px, transparent 1px);
    }

    /* ─── Layout ────────────────────────────────────────────────── */
    .app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 20px; width: 100%; }

    /* ─── Navbar ────────────────────────────────────────────────── */
    nav {
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      position: sticky; top: 0; z-index: 100;
      background: rgba(6, 12, 26, 0.6);
      transition: background var(--transition);
    }
    [data-theme="light"] nav { background: rgba(240, 244, 255, 0.7); }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1100px; margin: 0 auto; padding: 0 24px;
    }
    .logo {
      font-size: 1.5rem; font-weight: 800; text-decoration: none;
      background: var(--accent-g); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo:hover { opacity: 0.8; }

    .nav-controls { display: flex; align-items: center; gap: 10px; }

    /* ─── Custom Dropdown ───────────────────────────────────────── */
    .custom-select { position: relative; width: 130px; }
    .select-trigger {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 8px 12px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 0.8rem; font-weight: 500;
      color: var(--text); cursor: pointer; transition: all var(--transition);
      user-select: none;
    }
    .select-trigger:hover { border-color: var(--border-light); background: rgba(255,255,255,0.02); }
    .select-trigger.open { border-color: var(--accent); }
    .select-arrow {
      width: 14px; height: 14px; color: var(--text-dim);
      transition: transform var(--transition);
    }
    .select-trigger.open .select-arrow { transform: rotate(180deg); color: var(--accent); }

    .select-options {
      position: absolute; top: calc(100% + 8px); right: 0; width: 160px;
      background: var(--card-deep); border: 1px solid var(--border);
      border-radius: var(--radius-sm); backdrop-filter: var(--blur);
      box-shadow: var(--shadow); z-index: 1000;
      opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.95);
      transition: all 0.2s cubic-bezier(0.165, 0.84, 0.44, 1);
      overflow: hidden;
    }
    .select-options.show { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    .select-option {
      padding: 10px 14px; font-size: 0.82rem; color: var(--text-dim);
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      transition: all var(--transition);
    }
    .select-option:hover { background: rgba(56,189,248,0.1); color: var(--text); }
    .select-option.selected { color: var(--accent); font-weight: 600; background: rgba(56,189,248,0.05); }

    .option-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
    .select-option.selected .option-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-xs);
      border: 1px solid var(--border); background: var(--card);
      color: var(--text-dim); cursor: pointer; transition: all var(--transition);
    }
    .icon-btn:hover { border-color: var(--border-hover); color: var(--accent); transform: translateY(-1px); }
    .icon-btn svg { width: 16px; height: 16px; }

    /* ─── Result Layout ──────────────────────────────────────────── */
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      margin-top: 28px;
      animation: fade-up 0.5s ease both;
    }
    .result-main { display: flex; flex-direction: column; gap: 16px; }

    /* IP Hero Card */
    .ip-hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: var(--blur);
      transition: border-color var(--transition);
      position: relative;
    }
    .ip-hero-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent-g);
    }
    .ip-hero-card:hover { border-color: var(--border-light); }
    .ip-hero-inner {
      padding: 28px 28px 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .ip-flag {
      font-size: 3.8rem; line-height: 1; flex-shrink: 0;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
    }
    .ip-hero-info { flex: 1; min-width: 0; }
    .ip-hero-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
    }
    .ip-hero-addr {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(1.4rem, 3.5vw, 2.2rem);
      font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; line-height: 1.1;
      word-break: break-all;
    }
    .ip-hero-loc {
      margin-top: 8px; font-size: 0.95rem; font-weight: 500;
      color: var(--text-dim); display: flex; align-items: center; gap: 6px;
    }
    .ip-hero-loc::before { content: '📍'; font-size: 0.8rem; }
    .ip-hero-badges {
      padding: 14px 28px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .ip-hero-actions { margin-left: auto; display: flex; gap: 8px; }

    /* Net Info Card */
    .net-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: var(--blur);
      transition: border-color var(--transition);
    }
    .net-card:hover { border-color: var(--border-light); }
    .net-card-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .net-card-title {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
      display: flex; align-items: center; gap: 8px;
    }
    .net-card-title-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
    }
    .net-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 0;
    }
    .net-cell {
      padding: 18px 20px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 6px;
      transition: background var(--transition);
    }
    .net-cell:hover { background: rgba(56,189,248,0.03); }
    .net-cell:nth-child(3n) { border-right: none; }
    .net-cell:nth-last-child(-n+3) { border-bottom: none; }

    /* Sidebar cards */
    .result-sidebar { display: flex; flex-direction: column; gap: 16px; }
    .risk-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      backdrop-filter: var(--blur);
      transition: border-color var(--transition);
    }
    .risk-card:hover { border-color: var(--border-light); }
    .risk-card-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .risk-body { padding: 24px 20px; }
    .risk-gauge-wrap {
      display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
    }
    .risk-gauge-ring {
      width: 72px; height: 72px; flex-shrink: 0;
      position: relative; display: flex; align-items: center; justify-content: center;
    }
    .risk-gauge-ring svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .risk-gauge-ring circle {
      fill: none; stroke-width: 6; stroke-linecap: round;
    }
    .risk-ring-bg { stroke: rgba(255,255,255,0.06); }
    .risk-ring-fill { transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
    .risk-gauge-num {
      font-size: 1.5rem; font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1; position: relative; z-index: 1;
    }
    .risk-gauge-info { flex: 1; }
    .risk-level-label {
      font-size: 1rem; font-weight: 700; margin-bottom: 4px;
    }
    .risk-level-sub { font-size: 0.78rem; color: var(--text-dim); }
    .risk-bar-track {
      height: 5px; background: rgba(255,255,255,0.06);
      border-radius: 10px; overflow: hidden; margin-bottom: 16px;
    }
    .risk-bar-fill {
      height: 100%; border-radius: 10px;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .risk-factors-list { display: flex; flex-direction: column; gap: 7px; }
    .risk-factor-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 0.78rem; color: var(--text-dim);
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      line-height: 1.4;
    }
    .risk-factor-icon { flex-shrink: 0; margin-top: 1px; }
    .risk-clean {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; font-weight: 600; color: var(--success);
      padding: 10px 12px;
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 10px;
    }

    /* Shared data item */
    .data-item { display: flex; flex-direction: column; gap: 5px; }
    .data-key {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .data-val {
      font-size: 0.88rem; font-weight: 500; color: var(--text);
      word-break: break-word;
    }
    .data-val.mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .data-val.empty { color: var(--text-muted); font-style: italic; }

    /* Badges */
    .badge-group { display: flex; gap: 7px; flex-wrap: wrap; }
    .type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
      border: 1px solid var(--border); background: rgba(255,255,255,0.03);
      color: var(--text-dim);
    }
    .type-badge.v4 { color: var(--accent); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.06); }
    .type-badge.v6 { color: var(--accent-2); border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.06); }
    .type-badge.idc { color: var(--warning); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.06); }
    .type-badge.residential { color: var(--success); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.06); }
    .type-badge.mobile { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.06); }
    .type-badge.native { color: var(--accent); border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.06); }

    /* Copy button */
    .copy-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 10px; padding: 7px 14px;
      color: var(--text-dim); font-size: 0.8rem; font-family: inherit;
      cursor: pointer; transition: all var(--transition);
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(56,189,248,0.06); }
    .copy-btn.copied { color: var(--success); border-color: rgba(16,185,129,0.4); background: rgba(16,185,129,0.06); }
    .copy-btn svg { width: 13px; height: 13px; }

    /* Map link */
    .map-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.78rem; font-weight: 600; color: var(--accent-2);
      text-decoration: none; transition: opacity var(--transition);
      padding: 5px 0;
    }
    .map-link:hover { opacity: 0.8; }
    .map-link svg { width: 12px; height: 12px; }

    /* Responsive */
    @media (max-width: 780px) {
      .result-grid { grid-template-columns: 1fr; gap: 16px; }
      .ip-hero-inner { gap: 14px; padding: 20px; }
      .ip-flag { font-size: 3rem; }
      .ip-hero-addr { font-size: clamp(1.1rem, 5vw, 1.8rem); }
      .ip-hero-badges { padding: 12px 20px; }
      .ip-hero-actions { margin-left: 0; width: 100%; }
      .ip-hero-actions .copy-btn { flex: 1; justify-content: center; }
      .net-grid { grid-template-columns: repeat(2, 1fr); }
      .net-cell:nth-child(3n) { border-right: 1px solid var(--border); }
      .net-cell:nth-child(2n) { border-right: none; }
      .net-cell:nth-last-child(-n+3) { border-bottom: 1px solid var(--border); }
      .net-cell:nth-last-child(-n+2) { border-bottom: none; }
    }
    @media (max-width: 420px) {
      .net-grid { grid-template-columns: 1fr; }
      .net-cell { border-right: none !important; }
      .net-cell:last-child { border-bottom: none !important; }
    }

    /* ─── Hero ──────────────────────────────────────────────────── */
    .hero {
      padding: 60px 0 40px;
      text-align: center;
      animation: fade-up 0.6s ease both;
    }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800; line-height: 1.2; letter-spacing: -1px;
      margin-bottom: 24px;
    }
    .hero-title-g {
      background: var(--accent-g);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Search ────────────────────────────────────────────────── */
    .search-wrap { position: relative; max-width: 600px; margin: 0 auto 12px; }
    .search-bar {
      display: flex; align-items: center;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 100px; padding: 6px 6px 6px 22px;
      backdrop-filter: var(--blur); box-shadow: var(--shadow-card);
      transition: all var(--transition);
    }
    .search-bar:focus-within {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,.15), var(--shadow-card);
    }
    .search-icon { color: var(--text-muted); flex-shrink: 0; margin-right: 10px; }
    .search-icon svg { width: 16px; height: 16px; }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.95rem; font-family: 'JetBrains Mono', monospace;
      min-width: 0;
    }
    .search-input::placeholder { color: var(--text-muted); font-family: 'Inter', sans-serif; }
    .search-btn {
      flex-shrink: 0; background: var(--accent-g);
      border: none; border-radius: 100px; padding: 10px 22px;
      color: #fff; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all var(--transition);
    }
    .search-btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .search-btn:active { transform: none; }
    .search-hint { font-size: 0.75rem; color: var(--text-muted); text-align: center; }

    /* ─── Loading Skeleton ──────────────────────────────────────── */
    .skeleton-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px 32px;
      backdrop-filter: var(--blur);
      animation: fade-up 0.4s ease both;
    }
    .skeleton { border-radius: 6px; background: var(--border); animation: shimmer 1.5s infinite; }
    .sk-title { height: 12px; width: 60px; margin-bottom: 12px; }
    .sk-ip    { height: 28px; width: 220px; margin-bottom: 20px; }
    .sk-loc   { height: 40px; width: 180px; margin-bottom: 20px; }
    .sk-grid  { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .sk-item  { height: 40px; border-radius: 8px; }
    @keyframes shimmer {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }

    /* ─── Error Card ────────────────────────────────────────────── */
    .error-card {
      background: rgba(248,113,113,.06); border: 1px solid rgba(248,113,113,.2);
      border-radius: var(--radius); padding: 24px 28px;
      display: flex; align-items: center; gap: 14px;
      animation: fade-up 0.4s ease both;

    .error-icon { font-size: 1.8rem; }
    .error-text h3 { font-size: 0.95rem; font-weight: 600; color: var(--error); margin-bottom: 4px; }
    .error-text p  { font-size: 0.82rem; color: var(--text-dim); }

    /* ─── API Docs ───────────────────────────────────────────────── */

    .section-title {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .api-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); backdrop-filter: var(--blur);
      overflow: hidden; transition: border-color var(--transition);
    }
    .api-card:hover { border-color: var(--border-hover); }
    .api-card-header {
      padding: 20px 28px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; cursor: pointer;
      user-select: none;
    }
    .api-card-header-left { display: flex; align-items: center; gap: 12px; }
    .method-badge {
      background: rgba(52,211,153,.15); color: var(--success);
      border: 1px solid rgba(52,211,153,.25);
      font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
      font-weight: 700; padding: 4px 10px; border-radius: var(--radius-xs);
      letter-spacing: 0.05em;
    }
    .endpoint-text {
      font-family: 'JetBrains Mono', monospace; font-size: 0.88rem;
      color: var(--text);
    }
    .toggle-icon { color: var(--text-muted); transition: transform var(--transition); }
    .toggle-icon.open { transform: rotate(180deg); }
    .toggle-icon svg { width: 16px; height: 16px; }

    .api-body { padding: 24px 28px; display: none; }
    .api-body.open { display: block; animation: fade-up 0.25s ease both; }

    .params-table {
      width: 100%; border-collapse: collapse; font-size: 0.82rem;
      margin-bottom: 24px;
    }
    .params-table th {
      text-align: left; padding: 8px 12px;
      background: rgba(56,189,248,.04); border-bottom: 1px solid var(--border);
      color: var(--text-muted); font-weight: 600; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .params-table th:first-child { border-radius: var(--radius-xs) 0 0 0; }
    .params-table th:last-child  { border-radius: 0 var(--radius-xs) 0 0; }
    .params-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .params-table tr:last-child td { border-bottom: none; }
    .param-name { font-family: 'JetBrains Mono', monospace; color: var(--accent); }
    .param-type { color: var(--accent-2); font-size: 0.75rem; }

    .code-block {
      background: rgba(0,0,0,.3); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      color: var(--text-dim); line-height: 1.7; overflow-x: auto;
      white-space: pre; margin-bottom: 16px;
      position: relative;
    }
    [data-theme="light"] .code-block { background: rgba(240,244,255,.6); }
    .code-copy-btn {
      position: absolute; top: 8px; right: 8px;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-xs); padding: 4px 10px;
      color: var(--text-muted); font-size: 0.7rem; cursor: pointer;
      font-family: inherit; transition: all var(--transition);
    }
    .code-copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    .rate-info {
      font-size: 0.78rem; color: var(--text-muted);
      padding: 10px 14px; background: rgba(251,191,36,.06);
      border: 1px solid rgba(251,191,36,.15); border-radius: var(--radius-xs);
      display: flex; align-items: center; gap: 8px;
    }
    .rate-info::before { content: '⚡'; }

    /* ─── Footer ────────────────────────────────────────────────── */
    footer {
      margin-top: auto; padding: 28px 0;
      border-top: 1px solid var(--border);
      text-align: center; color: var(--text-muted); font-size: 0.78rem;
    }
    footer a { color: var(--text-dim); text-decoration: none; transition: color var(--transition); }
    footer a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

    /* ─── Animations ────────────────────────────────────────────── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; } to { opacity: 1; }
    }
    .anim-delay-1 { animation-delay: 0.1s; }
    .anim-delay-2 { animation-delay: 0.2s; }
    .anim-delay-3 { animation-delay: 0.3s; }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero { padding: 48px 0 32px; }
      .result-card, .skeleton-card { padding: 20px; }
      .result-header { flex-direction: column; gap: 12px; }
      .result-actions { width: 100%; }
      .copy-btn, .map-btn { flex: 1; justify-content: center; }
      .data-grid { grid-template-columns: repeat(2, 1fr); }
      .sk-grid { grid-template-columns: repeat(2, 1fr); }
      .api-body { padding: 16px; }
      .nav-inner { padding: 0 16px; }
    }
    @media (max-width: 380px) {
      .data-grid { grid-template-columns: 1fr 1fr; }
    }

</head>

        }

    };

    // ── Theme ───────────────────────────────────────────────────────
    const html = document.documentElement;
    let theme = localStorage.getItem('ipdu-theme') ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    function applyTheme(t) {
      theme = t;
      html.setAttribute('data-theme', t);
      const isDark = t === 'dark';
      document.getElementById('theme-icon-dark').style.display  = isDark ? '' : 'none';
      document.getElementById('theme-icon-light').style.display = isDark ? 'none' : '';
      localStorage.setItem('ipdu-theme', t);
    }
    applyTheme(theme);

    document.getElementById('theme-btn').addEventListener('click', () => {
      applyTheme(theme === 'dark' ? 'light' : 'dark');
    });

    // ── Language ────────────────────────────────────────────────────
    const storedLang = localStorage.getItem('ipdu-lang');
    const navLang = (storedLang || navigator.language || 'en').replace('_','-');
    let lang = Object.keys(LOCALES).find(k => navLang.startsWith(k.split('-')[0]) && LOCALES[k]) || 'en';
    if (storedLang && LOCALES[storedLang]) lang = storedLang;

    // ── Custom Dropdown Logic ───────────────────────────────────────
    const trigger = document.getElementById('lang-trigger');
    const optionsCont = document.getElementById('lang-options');
    const options = document.querySelectorAll('.select-option');
    const triggerText = document.getElementById('current-lang-text');

    function updateDropdownUI() {
      const selectedOption = Array.from(options).find(opt => opt.dataset.value === lang);
      if (selectedOption) {
        options.forEach(opt => opt.classList.remove('selected'));
        selectedOption.classList.add('selected');
        triggerText.textContent = selectedOption.textContent;
      }
    }
    updateDropdownUI();

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      trigger.classList.toggle('open');
      optionsCont.classList.toggle('show');
    });

    options.forEach(opt => {
      opt.addEventListener('click', () => {
        lang = opt.dataset.value;
        localStorage.setItem('ipdu-lang', lang);
        updateDropdownUI();
        applyLocale();
        trigger.classList.remove('open');
        optionsCont.classList.remove('show');
        if (lastResult) renderResult(lastResult, lastIsMyIp);
      });
    });

    document.addEventListener('click', () => {
      trigger.classList.remove('open');
      optionsCont.classList.remove('show');
    });

    function t() { return LOCALES[lang] || LOCALES.en; }

    function applyLocale() {
      const L = t();
      document.documentElement.lang = lang;
      document.getElementById('hero-main-title').textContent = L.mainTitle;
      document.getElementById('search-input').placeholder  = L.placeholder;
      document.getElementById('search-btn').textContent    = L.query;
      document.getElementById('footer-github').textContent = 'GitHub';
      document.getElementById('footer-api').textContent    = 'API';
      document.getElementById('footer-health').textContent = 'Health';
      document.title = 'IP-Du · IP Address Intelligence';
    }
    applyLocale();



    // ── Flag emoji ──────────────────────────────────────────────────
    function flagEmoji(code) {
      if (!code || code.length !== 2) return '🌐';
      return String.fromCodePoint(
        ...code.toUpperCase().split('').map(c => 0x1F1E6 + c.charCodeAt(0) - 65)
      );
    }

    // ── Render helpers ──────────────────────────────────────────────
    function dataField(label, value, mono) {
      const val = (value !== null && value !== undefined && value !== '')
        ? `<span class="data-val${mono ? ' mono' : ''}">${escHtml(String(value))}</span>`
        : `<span class="data-val empty">${t().noData}</span>`;
      return `<div class="data-item"><span class="data-key">${escHtml(label)}</span>${val}</div>`;
    }

    function escHtml(str) {
      if (str === null || str === undefined) return '';
      const s = String(str);
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let lastIsMyIp  = false;

    function renderLoading(isSearch) {
      document.getElementById('result-section').innerHTML = `

            <div class="skeleton sk-item"></div>

      document.getElementById('result-section').innerHTML = `

          <div class="error-text">
            <h3>Error</h3>

    }

    function renderResult(data, isMyIp) {
      lastResult = data;
      lastIsMyIp = isMyIp;
      const L = t();

      const versionClass = data.version === 'IPv6' ? 'v6' : 'v4';
      const riskScore = data.risk ?? 0;
      const coords = (data.lat && data.lon)
        ? `${data.lat.toFixed(4)}, ${data.lon.toFixed(4)}`
        : null;
      const mapUrl = (data.lat && data.lon)
        ? `https://www.openstreetmap.org/?mlat=${data.lat}&mlon=${data.lon}&zoom=10`
        : null;
      const cityRegion = [data.city, data.region].filter(Boolean).join(', ') || null;
      const riskColor = riskScore < 20 ? 'var(--success)' : riskScore < 55 ? 'var(--warning)' : 'var(--error)';
      const riskLevel = riskScore < 20 ? 'Low' : riskScore < 55 ? 'Medium' : 'High';
      // SVG ring: r=32, circumference ≈ 201
      const circumference = 201;
      const ringOffset = circumference - (riskScore / 100) * circumference;
      const typeClass = data.type === 'Data Center' ? 'idc' : data.type === 'Mobile' ? 'mobile' : 'residential';

      document.getElementById('result-section').innerHTML = `
        <div class="result-grid">
          <!-- Left: main info -->
          <div class="result-main">

            <!-- IP Hero -->
            <div class="ip-hero-card">
              <div class="ip-hero-inner">
                <div class="ip-flag">${flagEmoji(data.countryCode)}</div>
                <div class="ip-hero-info">
                  <div class="ip-hero-label">${isMyIp ? L.myIp : L.result}</div>
                  <div class="ip-hero-addr">${escHtml(data.ip)}</div>
                  <div class="ip-hero-loc">${escHtml([data.country, cityRegion].filter(Boolean).join(' · ') || 'Unknown Location')}</div>
                </div>
              </div>
              <div class="ip-hero-badges">
                <span class="type-badge ${versionClass}">${escHtml(data.version)}</span>
                <span class="type-badge ${typeClass}">${escHtml(L.typeLabels[data.type] || data.type)}</span>
                ${data.isNative ? `<span class="type-badge native">✦ ${escHtml(L.nativeIp)}</span>` : ''}
                <div class="ip-hero-actions">
                  <button class="copy-btn" id="copy-ip-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span id="copy-ip-label">${escHtml(L.copy)}</span>
                  </button>
                </div>
              </div>
            </div>

            <!-- Network Intel Grid -->
            <div class="net-card">
              <div class="net-card-header">
                <div class="net-card-title">
                  <span class="net-card-title-dot"></span>
                  Network Intelligence
                </div>
              </div>
              <div class="net-grid">
                <div class="net-cell">${dataField(L.fields.isp, data.isp)}</div>
                <div class="net-cell">${dataField(L.fields.org, data.org)}</div>
                <div class="net-cell">${dataField(L.fields.asn, data.asn, true)}</div>
                <div class="net-cell">${dataField(L.fields.country, data.country)}</div>
                <div class="net-cell">${dataField(L.fields.timezone, data.timezone)}</div>
                <div class="net-cell">
                  ${coords ? `
                    <span class="data-key">${escHtml(L.fields.coordinates)}</span>
                    <span class="data-val mono">${escHtml(coords)}</span>
                    ${mapUrl ? `<a href="${escHtml(mapUrl)}" target="_blank" class="map-link">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                      ${escHtml(L.mapBtn)}
                    </a>` : ''}
                  ` : dataField(L.fields.coordinates, null)}
                </div>
              </div>
            </div>

          </div>

          <!-- Right: risk sidebar -->
          <div class="result-sidebar">
            <div class="risk-card">
              <div class="risk-card-head">${escHtml(L.securityTitle)}</div>
              <div class="risk-body">
                <div class="risk-gauge-wrap">
                  <div class="risk-gauge-ring">
                    <svg viewBox="0 0 72 72">
                      <circle class="risk-ring-bg" cx="36" cy="36" r="32" />
                      <circle class="risk-ring-fill" cx="36" cy="36" r="32"
                        stroke="${riskColor}"
                        stroke-dasharray="${circumference}"
                        stroke-dashoffset="${ringOffset}" />
                    </svg>
                    <span class="risk-gauge-num" style="color:${riskColor}">${riskScore}</span>
                  </div>
                  <div class="risk-gauge-info">
                    <div class="risk-level-label" style="color:${riskColor}">${riskLevel} Risk</div>
                    <div class="risk-level-sub">${escHtml(L.riskLabel)} / 100</div>
                  </div>
                </div>
                <div class="risk-bar-track">
                  <div class="risk-bar-fill" style="width:${riskScore}%; background:${riskColor}"></div>
                </div>
                <div class="risk-factors-list">
                  ${(data.riskFactors || []).map(f => `
                    <div class="risk-factor-item">
                      <span class="risk-factor-icon">⚑</span>
                      <span>${escHtml(L.factorLabels[f] || f)}</span>
                    </div>
                  `).join('')}
                  ${riskScore < 20 ? `
                    <div class="risk-clean">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                      Verified Residential Signal
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>`;

      // Attach copy handler
      document.getElementById('copy-ip-btn').addEventListener('click', () => {
        copyText(data.ip, 'copy-ip-btn', 'copy-ip-label', L.copy, L.copied);
      });
    }

    function copyText(text, btnId, labelId, origLabel, doneLabel) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn   = document.getElementById(btnId);
        const label = document.getElementById(labelId);
        if (btn)   btn.classList.add('copied');
        if (label) label.textContent = doneLabel;
        setTimeout(() => {
          if (btn)   btn.classList.remove('copied');
          if (label) label.textContent = origLabel;
        }, 2000);
      });
    }

    // ── API Calls ───────────────────────────────────────────────────
    async function fetchLookup(query) {
      const url = query ? `/api/lookup?q=${encodeURIComponent(query)}` : '/api/lookup';
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    // Auto-detect client IP on load
    async function detectMyIp() {
      renderLoading(false);
      try {
        const data = await fetchLookup(null);
        renderResult(data, true);
      } catch (err) {
        renderError(err.message);
      }
    }

    // Search form
    document.getElementById('search-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = document.getElementById('search-input').value.trim();
      if (!query) { detectMyIp(); return; }
      renderLoading(true);
      try {
        const data = await fetchLookup(query);
        renderResult(data, false);
      } catch (err) {
        renderError(err.message);
      }
    });


    // ── Init ────────────────────────────────────────────────────────
    applyLocale();
    detectMyIp();
  })();
  </script>
</body>
</html>
